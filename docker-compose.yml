# Kavach — Full local development stack
# Includes: kavach gateway + redis + prometheus + grafana
#
# Usage:
#   docker compose up -d
#   curl http://localhost:8000/health
#   open http://localhost:3000   # Grafana (admin/admin)

version: "3.9"

services:

  # ── Kavach AI Security Gateway ──────────────────────────────────────
  kavach:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: kavach:latest
    container_name: kavach
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - KAVACH_LOG_LEVEL=${KAVACH_LOG_LEVEL:-info}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    volumes:
      # Persist trained models and attack vector index
      - kavach_data:/app/data/trained_models
      - kavach_vectors:/app/data/attack_vectors
      - kavach_rl:/app/data/rl_ppo
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - kavach_net

  # ── Redis — session and behavioral store ────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: kavach-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kavach_net

  # ── Prometheus — metrics collection ─────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.50.0
    container_name: kavach-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    networks:
      - kavach_net

  # ── Grafana — dashboards ─────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: kavach-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - kavach_net

volumes:
  kavach_data:
  kavach_vectors:
  kavach_rl:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  kavach_net:
    driver: bridge
